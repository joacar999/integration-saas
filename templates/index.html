<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Integration Workflows - MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-section h2 {
            color: #444;
            font-size: 16px;
            margin-bottom: 15px;
            margin-top: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
            padding: 12px 16px;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .btn-download {
            background: #4caf50;
            color: white;
            padding: 12px 16px;
            display: none;
        }

        .btn-download:hover {
            background: #45a049;
        }

        .btn-download.show {
            display: inline-block;
        }

        .output-section {
            display: none;
            margin-top: 30px;
        }

        .output-section.show {
            display: block;
        }

        .output-section h2 {
            color: #444;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .output-box {
            background: #f8f8f8;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 6px;
            margin: 15px 0;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success-badge {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- LOGO START -->
        <div style="text-align:center;">
        <img src="{{ url_for('static', filename='ConcilioDesign-logotype-notext.jpeg') }}" 
             alt="Concilio Design Logo" 
             style="width:120px; margin-bottom:10px;">
        </div>
        <!-- LOGO END -->

        <h1>Concilio Design - Integration Studio</h1>
        <p class="subtitle">Turn OpenAPI specs into production-ready Python clients</p>

        <div class="input-section">
            <h2>1. Paste your Swagger/OpenAPI JSON spec</h2>
            <textarea id="swaggerInput"
                placeholder='Paste your Swagger JSON here... Example: {"openapi":"3.0.0","info":{"title":"My API"}...}'></textarea>
        </div>

        <div class="controls">
            <button class="btn-generate" onclick="generateCode()">✨ Generate Python Examples</button>
            <button class="btn-clear" onclick="clearAll()">Clear</button>
            <button class="btn-download" id="downloadBtn" onclick="downloadCode()">⬇️ Download .py</button>
        </div>

        <div class="error" id="errorBox"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI is generating your integration code...</p>
        </div>

        <div class="output-section" id="outputSection">
            <div class="success-badge" id="successBadge"></div>
            <h2>2. Generated Python Integration Code</h2>
            <div class="output-box" id="outputCode"></div>
        </div>
    </div>

    <script>
        let generatedCode = '';

        async function generateCode() {
            const swagger = document.getElementById('swaggerInput').value.trim();

            if (!swagger) {
                showError('Please paste a Swagger/OpenAPI spec');
                return;
            }

            showLoading(true);
            clearError();

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ swagger_spec: swagger })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Generation failed');
                }

                generatedCode = result.generated_code;
                displayResults(result);

            } catch (error) {
                showError('Error: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function displayResults(result) {
            document.getElementById('successBadge').textContent =
                `✓ Found ${result.endpoints_found} endpoints in "${result.api_name}"`;
            document.getElementById('outputCode').textContent = generatedCode;
            document.getElementById('outputSection').classList.add('show');
            document.getElementById('downloadBtn').classList.add('show');
        }

        function downloadCode() {
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(generatedCode));
            element.setAttribute('download', 'api_integration.py');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        function clearAll() {
            document.getElementById('swaggerInput').value = '';
            document.getElementById('outputSection').classList.remove('show');
            document.getElementById('downloadBtn').classList.remove('show');
            clearError();
            generatedCode = '';
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.classList.add('show');
        }

        function clearError() {
            document.getElementById('errorBox').classList.remove('show');
        }
    </script>
</body>

</html>
